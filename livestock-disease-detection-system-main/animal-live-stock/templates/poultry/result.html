<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result - Poultry Diseases Identifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #d32f2f;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .image-container {
            text-align: center;
            margin: 30px 0;
        }
        
        .uploaded-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .result-section {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 10px;
            margin: 30px 0;
        }
        
        .result-item {
            margin: 15px 0;
            font-size: 1.2em;
            text-align: center;
        }
        
        .result-label {
            font-weight: bold;
            color: #333;
        }
        
        .result-value {
            color: #667eea;
            font-weight: bold;
        }
        
        .classification {
            font-size: 1.5em;
            color: #4caf50;
        }
        
        .score {
            font-size: 1.5em;
            color: #ff9800;
        }
        
        .back-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-container {
            text-align: center;
            margin-top: 30px;
        }
        
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #4caf50;
        }
        
        .footer h3 {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Analysis Results 🔬</h1>
        
        <div class="image-container">
            <img src="{{ url_for('poultry.uploaded_file', filename=filename) }}" alt="Uploaded Image" class="uploaded-image">
        </div>
        
        <div class="result-section">
            <div class="result-item">
                <span class="result-label">🐥 The image is classified as:</span><br>
                <span class="result-value classification">{{ prediction }}</span>
            </div>
            
            <div class="result-item">
                <span class="result-label">🐔 The similarity score is approximately:</span><br>
                <span class="result-value score">{{ confidence }}%</span>
            </div>
        </div>
        
        <div class="btn-container">
            <a href="/poultry/" class="back-btn">Analyze Another Image</a>
        </div>
        
    </div>
</body>
</html>

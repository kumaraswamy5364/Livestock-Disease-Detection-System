<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Disease Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='goats/styles.css') }}">
    <script src="{{ url_for('static', filename='goats/script.js') }}" defer></script>
</head>

<body>

    <header>
        <h1>Cat Disease Detector</h1>
        <p><a href="/" style="color: white; text-decoration: underline;">Back to home</a></p>
    </header>

    <section class="upload-section">
        <h2>Upload a Cat Image</h2>
        <div class="upload-box">
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage()">
        </div>

        <div id="previewContainer" style="display: none;">
            <img id="imagePreview" alt="Image Preview" class="preview-image">
        </div>

        <div id="buttonContainer" style="display: none;">
            <button onclick="uploadImage()">Analyze</button>
        </div>

        <div id="predictionResult"></div>
    </section>

</body>

</html>
